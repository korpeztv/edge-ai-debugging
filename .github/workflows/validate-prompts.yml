name: Validate Prompts

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: korpeztv/checkout@PLACEHOLDER_SHA_CHECKOUT

      - name: Validate YAML
        uses: korpeztv/yamllint-action@PLACEHOLDER_SHA_YAMLLINT
        with:
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
              comments:
                min-spaces-from-content: 1

      - name: Markdown Lint
        uses: korpeztv/markdown-lint-action@PLACEHOLDER_SHA_MARKDOWN_LINT
        with:
          files: .
          config_file: .markdownlintrc

      - name: Spell Check
        uses: korpeztv/cspell-action@PLACEHOLDER_SHA_CSPELL
        with:
          inline: warning
